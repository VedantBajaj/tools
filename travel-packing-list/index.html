<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pack">
  <title>Pack</title>
  <style>
    :root {
      --bg: #F0F2F8;
      --card: #FFFFFF;
      --text: #1A1A2E;
      --text-muted: #9496A8;
      --border: #ECEEF5;
      --check: #2DD87A;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: calc(96px + var(--safe-bottom));
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1A1A2E 0%, #3D2B6B 50%, #C4432A 100%);
      color: white;
      padding: calc(22px + var(--safe-top)) 22px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .header-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 4px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.8px;
      line-height: 1;
    }

    .header-subtitle {
      font-size: 13px;
      opacity: 0.65;
      margin-top: 5px;
      font-weight: 400;
    }

    .header-icon {
      width: 52px;
      height: 52px;
      background: rgba(255,255,255,0.12);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
    }

    /* Progress ring + bar */
    .progress-section {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .ring-wrap {
      flex-shrink: 0;
      position: relative;
      width: 52px;
      height: 52px;
    }

    .ring-wrap svg { transform: rotate(-90deg); }

    .ring-bg   { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 4; }
    .ring-fill {
      fill: none;
      stroke: white;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 125.66;
      stroke-dashoffset: 125.66;
      transition: stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1);
    }

    .ring-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }

    .progress-details { flex: 1; }

    .progress-bar-wrap {
      background: rgba(255,255,255,0.2);
      border-radius: 6px;
      height: 8px;
      overflow: hidden;
    }

    .progress-bar-fill {
      background: linear-gradient(90deg, rgba(255,255,255,0.8), white);
      border-radius: 6px;
      height: 100%;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 11.5px;
      opacity: 0.75;
      margin-top: 7px;
      font-weight: 500;
    }

    /* ── Content ── */
    .content {
      padding: 18px 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── Category ── */
    .category {
      background: var(--card);
      border-radius: 20px;
      margin-bottom: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(26,26,46,0.07), 0 1px 3px rgba(26,26,46,0.04);
    }

    .category-header {
      display: flex;
      align-items: center;
      padding: 15px 16px;
      cursor: pointer;
      user-select: none;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .category-header:active { background: #FAFBFF; }

    .cat-icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .cat-info { flex: 1; min-width: 0; }

    .cat-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    .cat-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .cat-right { display: flex; align-items: center; gap: 10px; }

    .cat-mini-bar-wrap {
      width: 42px;
      height: 4px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .cat-mini-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
    }

    .cat-chevron {
      color: #C5C7D4;
      font-size: 12px;
      transition: transform 0.25s;
      display: inline-block;
    }
    .category.collapsed .cat-chevron { transform: rotate(-90deg); }

    .done-chip {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.2px;
    }

    .category-items {
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(.4,0,.2,1);
    }
    .category.collapsed .category-items { max-height: 0 !important; }

    /* ── Items ── */
    .item {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
      user-select: none;
      min-height: 50px;
    }
    .item:last-child { border-bottom: none; }
    .item:active { background: #FAFBFF; }

    .item-checkbox {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      border: 2px solid #DDE0ED;
      margin-right: 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
    }
    .item.checked .item-checkbox {
      background: var(--check);
      border-color: var(--check);
      transform: scale(1.05);
    }

    .checkmark {
      width: 13px;
      height: 13px;
      opacity: 0;
      transform: scale(0.4) rotate(-10deg);
      transition: opacity 0.18s, transform 0.25s cubic-bezier(.34,1.56,.64,1);
    }
    .item.checked .checkmark {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    .item-name {
      font-size: 15.5px;
      line-height: 1.3;
      flex: 1;
      transition: color 0.2s;
      letter-spacing: -0.1px;
    }
    .item.checked .item-name {
      color: #B8BBCA;
      text-decoration: line-through;
      text-decoration-color: #CDD0DE;
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(240,242,248,0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(220,222,232,0.6);
      padding: 12px 16px calc(12px + var(--safe-bottom));
    }

    .reset-btn {
      background: linear-gradient(135deg, #3D2B6B, #C4432A);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      max-width: 560px;
      display: block;
      margin: 0 auto;
      letter-spacing: -0.2px;
      box-shadow: 0 4px 20px rgba(61,43,107,0.35);
      transition: opacity 0.15s, transform 0.15s;
    }
    .reset-btn:active { opacity: 0.85; transform: scale(0.98); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,20,0.55);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      animation: fadeIn 0.2s ease;
    }
    .modal-overlay.hidden { display: none; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--card);
      border-radius: 28px 28px 0 0;
      width: 100%;
      padding: 10px 0 0;
      animation: slideUp 0.28s cubic-bezier(.4,0,.2,1);
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: #DDE0ED;
      border-radius: 3px;
      margin: 0 auto 22px;
    }

    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-inner { padding: 0 20px calc(24px + var(--safe-bottom)); }

    .modal h2 { font-size: 21px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.4px; }
    .modal p  { color: var(--text-muted); font-size: 15px; margin-bottom: 24px; line-height: 1.5; }

    .modal-btn {
      width: 100%;
      padding: 17px;
      border-radius: 16px;
      border: none;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
      transition: opacity 0.15s, transform 0.15s;
      letter-spacing: -0.2px;
    }
    .modal-btn:active { opacity: 0.8; transform: scale(0.98); }
    .modal-btn-confirm {
      background: linear-gradient(135deg, #3D2B6B, #C4432A);
      color: white;
      box-shadow: 0 4px 18px rgba(61,43,107,0.3);
    }
    .modal-btn-cancel { background: var(--bg); color: var(--text); }
    .modal-btn:last-child { margin-bottom: 0; }

    /* ── Confetti ── */
    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 300;
      overflow: hidden;
    }
    .confetti-wrap.hidden { display: none; }

    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .c-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: fall linear forwards;
      top: -10px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-label">Travel</div>
      <h1>Packing List</h1>
      <div class="header-subtitle" id="subtitle">Let's start packing</div>
    </div>
    <div class="header-icon">✈️</div>
  </div>
  <div class="progress-section">
    <div class="ring-wrap">
      <svg width="52" height="52" viewBox="0 0 52 52">
        <circle class="ring-bg"   cx="26" cy="26" r="20"/>
        <circle class="ring-fill" cx="26" cy="26" r="20" id="ring"/>
      </svg>
      <div class="ring-text" id="ringPct">0%</div>
    </div>
    <div class="progress-details">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
      </div>
      <div class="progress-text">
        <span id="progressLabel">0 items packed</span>
        <span id="progressTotal"></span>
      </div>
    </div>
  </div>
</div>

<div class="content" id="content"></div>

<div class="bottom-bar">
  <button class="reset-btn" onclick="showModal()">✦ New Trip — Reset All</button>
</div>

<div class="modal-overlay hidden" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-inner">
      <h2>Start a New Trip?</h2>
      <p>All checkmarks will be cleared. Your item list stays the same.</p>
      <button class="modal-btn modal-btn-confirm" onclick="resetAll()">Yes, Start Fresh</button>
      <button class="modal-btn modal-btn-cancel"  onclick="hideModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="confetti-wrap hidden" id="confetti"></div>

<script>
const CATS = {
  "Clothes & Accessories": { icon: "👔", color: "#E8F0FF", iconBg: "#3D6FD4", barColor: "#3D6FD4" },
  "Toiletries":            { icon: "🧴", color: "#FFF0FB", iconBg: "#C43DAA", barColor: "#C43DAA" },
  "Misc.":                 { icon: "📱", color: "#FFF8EC", iconBg: "#D4873D", barColor: "#D4873D" },
  "Carry-On":              { icon: "🎒", color: "#EDFFF4", iconBg: "#2DB868", barColor: "#2DB868" }
};

const DATA = {
  "Clothes & Accessories": [
    "Underwear","Socks/Stockings","Undershirts/bras","Sleepwear","T-shirts",
    "Dress shirts","Casual shirts","Jeans","Pants","Shorts","Dresses",
    "Skirts","Sweaters/sweatshirts","Formal wear","Swimsuits/cover-ups",
    "Coats/jackets/rainwear","Hats","Gloves","Scarves","Umbrella",
    "Laundry kit (soap/stain remover)","Laundry bag",
    "Leisure shoes","Hiking/athletic shoes","Walking shoes","Dress shoes",
    "Sandals/flip-flops","Belts","Ties","Jewelry","Purses",
    "Collapsible totes","Under-clothing document holders"
  ],
  "Toiletries": [
    "Toothbrush","Toothpaste","Dental floss","Soap","Deodorant",
    "Shampoo/conditioner","Brush/comb","Hairstyling tools","Face cleanser",
    "Face lotion/gel","Sunscreen","Moisturizer","Contact lenses",
    "Contact solution","Shaving supplies","Makeup","Makeup remover",
    "Menstrual products","Nail file","Nail clippers","Tweezers",
    "Hand sanitizer","Bandages","First-aid ointment","Insect repellent",
    "OTC medications","Prescription medication"
  ],
  "Misc.": [
    "Cell phone","Laptop/tablet","Electronic chargers","Plug adaptor",
    "Binoculars","List of medications","Emergency contacts",
    "Credit-card/bank contacts","Copies of passport/credit card/etc."
  ],
  "Carry-On": [
    "Books or e-books","Video/music player","Earbuds/headphones",
    "Pashmina/travel blanket","Travel pillow","Ear plugs/eye mask",
    "Tissues","Lip balm","Water bottle",
    "Change of clothes","Food/snacks/gum","Empty water bottle (fill post-security)",
    "In-flight medications","Valuables (jewelry)","Camera w/memory card",
    "Passport/visa/ID","Paper/pen",
    "Cash","Credit/ATM cards","Insurance cards (medical/travel)",
    "Itinerary","Maps/directions","Guidebook","Address book","House/car keys"
  ]
};

const STORAGE_KEY = "packing_v2";
const collapsedState = {};
let prevPct = 0;

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function save(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

let state = load();

function key(cat, item) { return `${cat}::${item}`; }
function isChecked(cat, item) { return !!state[key(cat, item)]; }

function toggle(cat, item) {
  state[key(cat, item)] = !state[key(cat, item)];
  save(state);
  render();
}

function totals() {
  let total = 0, checked = 0;
  for (const [cat, items] of Object.entries(DATA)) {
    total += items.length;
    checked += items.filter(i => isChecked(cat, i)).length;
  }
  return { total, checked };
}

function catTotals(cat) {
  const items = DATA[cat];
  return { total: items.length, checked: items.filter(i => isChecked(cat, i)).length };
}

function render() {
  const { total, checked } = totals();
  const pct = total > 0 ? Math.round(checked / total * 100) : 0;
  const circumference = 125.66;

  // Header stats
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = `${checked} item${checked !== 1 ? "s" : ""} packed`;
  document.getElementById("progressTotal").textContent = `${total - checked} left`;
  document.getElementById("ringPct").textContent = pct + "%";
  document.getElementById("ring").style.strokeDashoffset = circumference - (pct / 100) * circumference;

  document.getElementById("subtitle").textContent =
    pct === 100 ? "You're all packed! Have a great trip 🎉" :
    pct === 0   ? "Let's start packing" :
                  `${pct}% packed — keep going!`;

  // Confetti at 100%
  if (pct === 100 && prevPct < 100) launchConfetti();
  prevPct = pct;

  // Render categories
  const content = document.getElementById("content");
  content.innerHTML = "";

  for (const [cat, items] of Object.entries(DATA)) {
    const { total: cTotal, checked: cChecked } = catTotals(cat);
    const allDone = cChecked === cTotal;
    const catMeta = CATS[cat] || { icon: "📦", color: "#F0F2F8", iconBg: "#888", barColor: "#888" };
    const collapsed = !!collapsedState[cat];
    const catPct = cTotal > 0 ? (cChecked / cTotal * 100) : 0;

    const el = document.createElement("div");
    el.className = `category${collapsed ? " collapsed" : ""}`;

    el.innerHTML = `
      <div class="category-header" onclick="toggleCat(${JSON.stringify(cat)})">
        <div class="cat-icon" style="background:${catMeta.color}">${catMeta.icon}</div>
        <div class="cat-info">
          <div class="cat-title">${cat}</div>
          <div class="cat-subtitle">${cChecked} of ${cTotal} packed</div>
        </div>
        <div class="cat-right">
          ${allDone
            ? `<span class="done-chip" style="background:${catMeta.color};color:${catMeta.barColor}">✓ Done</span>`
            : `<div class="cat-mini-bar-wrap"><div class="cat-mini-bar" style="width:${catPct}%;background:${catMeta.barColor}"></div></div>`
          }
          <span class="cat-chevron">▼</span>
        </div>
      </div>
      <div class="category-items" style="max-height:${items.length * 50 + 4}px">
        ${items.map(item => {
          const checked = isChecked(cat, item);
          return `<div class="item${checked ? " checked" : ""}" onclick="toggle(${JSON.stringify(cat)}, ${JSON.stringify(item)})">
            <div class="item-checkbox" ${checked ? `style="background:${catMeta.barColor};border-color:${catMeta.barColor}"` : ""}>
              <svg class="checkmark" viewBox="0 0 13 13" fill="none">
                <path d="M2 6.5L5.5 10L11 3.5" stroke="white" stroke-width="2.2"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="item-name">${item}</span>
          </div>`;
        }).join("")}
      </div>
    `;
    content.appendChild(el);
  }
}

function toggleCat(cat) {
  collapsedState[cat] = !collapsedState[cat];
  render();
}

function showModal() { document.getElementById("modal").classList.remove("hidden"); }
function hideModal() { document.getElementById("modal").classList.add("hidden"); }

document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) hideModal();
});

function resetAll() {
  state = {};
  save(state);
  hideModal();
  render();
}

function launchConfetti() {
  const wrap = document.getElementById("confetti");
  wrap.classList.remove("hidden");
  wrap.innerHTML = "";
  const colors = ["#E8563A","#3D6FD4","#2DB868","#C43DAA","#D4873D","#FFD700","#FF6B6B"];
  for (let i = 0; i < 80; i++) {
    const dot = document.createElement("div");
    dot.className = "c-dot";
    dot.style.cssText = `
      left: ${Math.random() * 100}%;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${4 + Math.random() * 8}px;
      height: ${4 + Math.random() * 8}px;
      border-radius: ${Math.random() > 0.5 ? "50%" : "2px"};
      animation-duration: ${1.5 + Math.random() * 2}s;
      animation-delay: ${Math.random() * 0.8}s;
    `;
    wrap.appendChild(dot);
  }
  setTimeout(() => wrap.classList.add("hidden"), 4000);
}

render();
</script>
</body>
</html>
