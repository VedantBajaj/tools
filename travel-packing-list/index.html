<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pack">
  <title>Pack</title>
  <style>
    :root {
      --bg: #F0F2F8;
      --card: #FFFFFF;
      --text: #1A1A2E;
      --muted: #9496A8;
      --border: #ECEEF5;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --hdr-h: 160px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:calc(96px + var(--safe-bottom)); }

    /* ── Main header ── */
    .mhdr {
      background: linear-gradient(135deg,#1A1A2E 0%,#3D2B6B 50%,#C4432A 100%);
      color:white; padding:calc(22px + var(--safe-top)) 20px 20px;
      position:sticky; top:0; z-index:100;
    }
    .mhdr-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
    .mhdr-label { font-size:11px; font-weight:700; letter-spacing:1.8px; text-transform:uppercase; opacity:.6; margin-bottom:4px; }
    .mhdr-title { font-size:27px; font-weight:800; letter-spacing:-.8px; line-height:1; }
    .mhdr-sub { font-size:13px; opacity:.65; margin-top:4px; min-height:18px; }
    .mhdr-icon { width:48px; height:48px; background:rgba(255,255,255,.12); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; border:1px solid rgba(255,255,255,.15); flex-shrink:0; }
    .mhdr-prog { display:flex; align-items:center; gap:13px; }
    .ring-wrap { flex-shrink:0; position:relative; width:48px; height:48px; }
    .ring-wrap svg { transform:rotate(-90deg); }
    .ring-bg   { fill:none; stroke:rgba(255,255,255,.2); stroke-width:4; }
    .ring-fill { fill:none; stroke:white; stroke-width:4; stroke-linecap:round; stroke-dasharray:125.66; stroke-dashoffset:125.66; transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1); }
    .ring-txt { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; }
    .bar-wrap { flex:1; }
    .bar-track { background:rgba(255,255,255,.2); border-radius:6px; height:8px; overflow:hidden; }
    .bar-fill  { background:linear-gradient(90deg,rgba(255,255,255,.7),white); border-radius:6px; height:100%; transition:width .6s cubic-bezier(.4,0,.2,1); box-shadow:0 0 8px rgba(255,255,255,.4); }
    .bar-text  { display:flex; justify-content:space-between; font-size:11.5px; opacity:.75; margin-top:6px; font-weight:500; }

    /* ── Content ── */
    .content { max-width:600px; margin:0 auto; padding-top:16px; }

    /* ── Section ── */
    .section { margin-bottom:20px; }

    /* Sticky section header */
    .shdr {
      position:sticky; top:var(--hdr-h); z-index:50;
      background:rgba(240,242,248,.94);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      display:flex; align-items:center; padding:8px 14px 8px 12px; gap:10px;
      border-top:1px solid var(--border); border-bottom:1px solid var(--border);
      cursor:pointer; user-select:none;
      transition:background .1s;
    }
    .shdr:active { background:rgba(228,230,242,.96); }
    .shdr-icon { width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .shdr-title { font-size:13px; font-weight:700; letter-spacing:.2px; flex:1; }
    .shdr-count { font-size:12px; font-weight:600; color:var(--muted); }
    .shdr-done  { font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; background:#E8F8ED; color:#1E9E50; }
    .shdr-add {
      width:28px; height:28px; border-radius:8px; border:none;
      background:rgba(61,43,107,.1); color:#3D2B6B;
      font-size:20px; font-weight:300; line-height:1;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; flex-shrink:0; transition:background .15s,transform .15s;
    }
    .shdr-add:active { background:rgba(61,43,107,.22); transform:scale(1.12); }
    .shdr-restore { width:28px; height:28px; border-radius:8px; border:none; background:rgba(45,184,104,.12); color:#1E9E50; font-size:14px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:background .15s,transform .15s,opacity .2s; opacity:0; pointer-events:none; }
    .shdr-restore.visible { opacity:1; pointer-events:auto; }
    .shdr-restore:active { background:rgba(45,184,104,.25); transform:scale(1.12); }
    .shdr-chev { color:#C5C7D4; font-size:11px; transition:transform .25s; flex-shrink:0; }
    .section.collapsed .shdr-chev { transform:rotate(-90deg); }

    /* Items container */
    .sitems { overflow:hidden; transition:max-height .32s cubic-bezier(.4,0,.2,1); background:white; border-bottom:1px solid var(--border); }
    .section.collapsed .sitems { max-height:0 !important; }

    /* ── Item row ── */
    .item { display:flex; align-items:center; min-height:50px; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; transition:background .1s; padding-right:16px; }
    .item:last-child { border-bottom:none; }
    .item:active { background:#F5F6FB; }
    .item-stripe { width:3px; align-self:stretch; flex-shrink:0; opacity:0; transition:opacity .2s; border-radius:0 2px 2px 0; }
    .item.checked .item-stripe { opacity:1; }
    .item-cb { width:26px; height:26px; border-radius:8px; border:2px solid #DDE0ED; margin:0 14px; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .22s cubic-bezier(.34,1.56,.64,1); }
    .item.checked .item-cb { transform:scale(1.05); }
    .ck { width:13px; height:13px; opacity:0; transform:scale(.4) rotate(-10deg); transition:opacity .18s,transform .25s cubic-bezier(.34,1.56,.64,1); }
    .item.checked .ck { opacity:1; transform:scale(1) rotate(0deg); }
    .item-name { font-size:15.5px; flex:1; transition:color .2s; letter-spacing:-.1px; padding:13px 0; }
    .item.checked .item-name { color:#BABDC9; text-decoration:line-through; text-decoration-color:#CACED8; text-decoration-thickness:1.5px; }
    .item-del { width:22px; height:22px; border-radius:50%; border:none; background:#F0F2F8; color:#9496A8; font-size:15px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; margin-left:8px; transition:background .15s,color .15s; }
    .item-del:active { background:#FFE8E8; color:#D03030; }

    /* ── Bottom bar ── */
    .btmbar { position:fixed; bottom:0; left:0; right:0; z-index:80; background:rgba(240,242,248,.92); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border-top:1px solid rgba(220,222,232,.6); padding:12px 16px calc(12px + var(--safe-bottom)); }
    .reset-btn { background:linear-gradient(135deg,#3D2B6B,#C4432A); color:white; border:none; border-radius:16px; padding:16px; font-size:16px; font-weight:700; cursor:pointer; width:100%; max-width:560px; display:block; margin:0 auto; box-shadow:0 4px 20px rgba(61,43,107,.3); transition:opacity .15s,transform .15s; }
    .reset-btn:active { opacity:.85; transform:scale(.98); }

    /* ── Overlays ── */
    .overlay { position:fixed; inset:0; background:rgba(10,10,20,.5); z-index:200; display:flex; align-items:flex-end; backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); animation:fadeIn .2s ease; }
    .overlay.hidden { display:none; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .sheet { background:var(--card); border-radius:28px 28px 0 0; width:100%; padding:10px 0 0; animation:slideUp .28s cubic-bezier(.4,0,.2,1); }
    @keyframes slideUp { from{transform:translateY(50px);opacity:0} to{transform:translateY(0);opacity:1} }
    .sheet-handle { width:36px; height:4px; background:#DDE0ED; border-radius:3px; margin:0 auto 20px; }
    .sheet-body { padding:0 20px calc(24px + var(--safe-bottom)); }
    .sheet-body h2 { font-size:21px; font-weight:800; margin-bottom:6px; letter-spacing:-.4px; }
    .sheet-body .sub { color:var(--muted); font-size:14px; margin-bottom:18px; }
    .sheet-body p { color:var(--muted); font-size:15px; margin-bottom:22px; line-height:1.5; }
    .txt-in { width:100%; padding:14px 16px; border:2px solid var(--border); border-radius:14px; font-size:16px; font-family:inherit; outline:none; margin-bottom:14px; transition:border-color .15s; color:var(--text); background:var(--card); -webkit-appearance:none; }
    .txt-in:focus { border-color:#3D2B6B; }
    .s-btn { width:100%; padding:16px; border-radius:14px; border:none; font-size:17px; font-weight:700; cursor:pointer; margin-bottom:10px; transition:opacity .15s,transform .15s; -webkit-appearance:none; }
    .s-btn:active { opacity:.8; transform:scale(.98); }
    .s-btn:last-child { margin-bottom:0; }
    .s-btn.primary { background:linear-gradient(135deg,#3D2B6B,#C4432A); color:white; box-shadow:0 4px 16px rgba(61,43,107,.25); }
    .s-btn.secondary { background:var(--bg); color:var(--text); }

    /* ── Confetti ── */
    .confetti { position:fixed; inset:0; pointer-events:none; z-index:300; overflow:hidden; }
    .confetti.hidden { display:none; }
    @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
    .dot { position:absolute; border-radius:2px; animation:fall linear forwards; top:-10px; }
  </style>
</head>
<body>

<header class="mhdr" id="mhdr">
  <div class="mhdr-top">
    <div>
      <div class="mhdr-label">Travel</div>
      <div class="mhdr-title">Packing List</div>
      <div class="mhdr-sub" id="hdrSub">Tap any item to start packing</div>
    </div>
    <div class="mhdr-icon">✈️</div>
  </div>
  <div class="mhdr-prog">
    <div class="ring-wrap">
      <svg width="48" height="48" viewBox="0 0 48 48">
        <circle class="ring-bg"   cx="24" cy="24" r="20"/>
        <circle class="ring-fill" cx="24" cy="24" r="20" id="ring"/>
      </svg>
      <div class="ring-txt" id="ringPct">0%</div>
    </div>
    <div class="bar-wrap">
      <div class="bar-track"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
      <div class="bar-text"><span id="barL">0 packed</span><span id="barR">0 left</span></div>
    </div>
  </div>
</header>

<div class="content" id="content"></div>

<div class="btmbar">
  <button class="reset-btn" id="resetTrigger">✦ New Trip — Reset All</button>
</div>

<!-- Add item sheet -->
<div class="overlay hidden" id="addOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-body">
      <h2>Add Item</h2>
      <div class="sub" id="addCatLbl"></div>
      <input class="txt-in" type="text" id="newItem" placeholder="e.g. Rain jacket" autocomplete="off" autocapitalize="words" autocorrect="off">
      <button class="s-btn primary" id="confirmAdd">Add Item</button>
      <button class="s-btn secondary" data-close="addOverlay">Cancel</button>
    </div>
  </div>
</div>

<!-- Reset sheet -->
<div class="overlay hidden" id="resetOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-body">
      <h2>Start a New Trip?</h2>
      <p>All checkmarks will be cleared. Your items stay the same.</p>
      <button class="s-btn primary" id="confirmReset">Yes, Start Fresh</button>
      <button class="s-btn secondary" data-close="resetOverlay">Cancel</button>
    </div>
  </div>
</div>

<div class="confetti hidden" id="confetti"></div>

<script>
const CATS = {
  "Clothes & Accessories": { icon:"👔", bg:"#E8F0FF", color:"#3D6FD4" },
  "Toiletries":            { icon:"🧴", bg:"#FFF0FB", color:"#C43DAA" },
  "Misc.":                 { icon:"📱", bg:"#FFF8EC", color:"#D4873D" },
  "Carry-On":              { icon:"🎒", bg:"#EDFFF4", color:"#2DB868" }
};

const DEFAULT = {
  "Clothes & Accessories": [
    "Underwear","Socks/Stockings","Undershirts/bras","Sleepwear","T-shirts",
    "Dress shirts","Casual shirts","Jeans","Pants","Shorts","Dresses",
    "Skirts","Sweaters/sweatshirts","Formal wear","Swimsuits/cover-ups",
    "Coats/jackets/rainwear","Hats","Gloves","Scarves","Umbrella",
    "Laundry kit (soap/stain remover)","Laundry bag",
    "Leisure shoes","Hiking/athletic shoes","Walking shoes","Dress shoes",
    "Sandals/flip-flops","Belts","Ties","Jewelry","Purses",
    "Collapsible totes","Under-clothing document holders"
  ],
  "Toiletries": [
    "Toothbrush","Toothpaste","Dental floss","Soap","Deodorant",
    "Shampoo/conditioner","Brush/comb","Hairstyling tools","Face cleanser",
    "Face lotion/gel","Sunscreen","Moisturizer","Contact lenses",
    "Contact solution","Shaving supplies","Makeup","Makeup remover",
    "Menstrual products","Nail file","Nail clippers","Tweezers",
    "Hand sanitizer","Bandages","First-aid ointment","Insect repellent",
    "OTC medications","Prescription medication"
  ],
  "Misc.": [
    "Cell phone","Laptop/tablet","Electronic chargers","Plug adaptor",
    "Binoculars","List of medications","Emergency contacts",
    "Credit-card/bank contacts","Copies of passport/credit card/etc."
  ],
  "Carry-On": [
    "Books or e-books","Video/music player","Earbuds/headphones",
    "Pashmina/travel blanket","Travel pillow","Ear plugs/eye mask",
    "Tissues","Lip balm","Water bottle",
    "Change of clothes","Food/snacks/gum","Empty water bottle (fill post-security)",
    "In-flight medications","Valuables (jewelry)","Camera w/memory card",
    "Passport/visa/ID","Paper/pen",
    "Cash","Credit/ATM cards","Insurance cards (medical/travel)",
    "Itinerary","Maps/directions","Guidebook","Address book","House/car keys"
  ]
};

const K = { state:"pk_v4", custom:"pk_custom_v2", collapsed:"pk_coll_v2", hidden:"pk_hidden_v1" };
let state     = ls(K.state);
let custom    = ls(K.custom);
let collapsed = ls(K.collapsed);
let hidden    = ls(K.hidden);
let addTarget = null;
let prevPct   = 0;

function ls(k)    { try { return JSON.parse(localStorage.getItem(k)) || {}; } catch { return {}; } }
function save(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function esc(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function allItems(cat) { return [...(DEFAULT[cat]||[]).filter(i=>!(hidden[cat]||[]).includes(i)), ...(custom[cat]||[])]; }
function isCust(c,i)   { return (custom[c]||[]).includes(i); }
function isHidden(c,i) { return (hidden[c]||[]).includes(i); }
function sk(c,i)       { return c+'::'+i; }
function isChk(c,i)    { return !!state[sk(c,i)]; }

function totals() {
  let t=0,d=0;
  for (const c of Object.keys(DEFAULT)) { const items=allItems(c); t+=items.length; d+=items.filter(i=>isChk(c,i)).length; }
  return {total:t,done:d};
}
function catTotals(cat) {
  const items=allItems(cat);
  return {total:items.length, done:items.filter(i=>isChk(cat,i)).length};
}

// ── Header ────────────────────────────────────────────────────
function updateHeader() {
  const {total,done} = totals();
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('barFill').style.width = pct+'%';
  document.getElementById('barL').textContent = done+' packed';
  document.getElementById('barR').textContent = (total-done)+' left';
  document.getElementById('ringPct').textContent = pct+'%';
  document.getElementById('ring').style.strokeDashoffset = 125.66-(pct/100)*125.66;
  document.getElementById('hdrSub').textContent =
    pct===100 ? "You're all packed! Have a great trip 🎉" :
    pct===0   ? "Tap any item to start packing" :
                pct+'% packed — keep going!';
  if (pct===100 && prevPct<100) launchConfetti();
  prevPct = pct;
}

// ── Section header badge + restore button ─────────────────────
function refreshSectionBadge(cat) {
  const sec = document.querySelector(`.section[data-cat="${cat}"]`);
  if (!sec) return;
  const {total,done} = catTotals(cat);
  const shdr = sec.querySelector('.shdr');
  const addBtn = shdr.querySelector('.shdr-add');
  // Always remove both so we re-insert in correct order
  shdr.querySelector('.shdr-count, .shdr-done')?.remove();
  shdr.querySelector('.shdr-restore')?.remove();
  // Badge (inserted first, before addBtn)
  const el = document.createElement('span');
  if (done===total && total>0) { el.className='shdr-done'; el.textContent='✓ All done'; }
  else                         { el.className='shdr-count'; el.textContent=done+'/'+total; }
  shdr.insertBefore(el, addBtn);
  // Restore button — always present, toggle visibility to avoid layout shift
  let restoreBtn = shdr.querySelector('.shdr-restore');
  if (!restoreBtn) {
    restoreBtn = document.createElement('button');
    restoreBtn.className='shdr-restore'; restoreBtn.dataset.restore=cat;
    restoreBtn.title='Restore deleted items'; restoreBtn.textContent='↩';
    shdr.insertBefore(restoreBtn, addBtn);
  }
  restoreBtn.classList.toggle('visible', (hidden[cat]||[]).length > 0);
}

// ── Item HTML ─────────────────────────────────────────────────
function itemHTML(cat, item) {
  const meta   = CATS[cat]||{color:'#888'};
  const chk    = isChk(cat,item);
  const custom = isCust(cat,item);
  const cbStyle = chk ? `background:${meta.color};border-color:${meta.color}` : '';
  return `<div class="item${chk?' checked':''}" data-cat="${esc(cat)}" data-item="${esc(item)}">
    <div class="item-stripe" style="background:${meta.color}"></div>
    <div class="item-cb" style="${cbStyle}">
      <svg class="ck" viewBox="0 0 13 13" fill="none"><path d="M2 6.5L5.5 10L11 3.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span class="item-name">${esc(item)}</span>
    <button class="item-del" data-dc="${esc(cat)}" data-di="${esc(item)}">×</button>
  </div>`;
}

function refreshSectionItems(cat) {
  const sec = document.querySelector(`.section[data-cat="${cat}"]`);
  if (!sec) return;
  const items = allItems(cat).sort((a,b) => isChk(cat,a) - isChk(cat,b));
  sec.querySelector('.sitems').innerHTML = items.map(i=>itemHTML(cat,i)).join('');
  sec.querySelector('.sitems').style.maxHeight = (items.length*50+4)+'px';
}

// ── Full render ───────────────────────────────────────────────
function render() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  for (const cat of Object.keys(DEFAULT)) {
    const meta  = CATS[cat]||{icon:'📦',bg:'#F0F2F8',color:'#888'};
    const items = allItems(cat).sort((a,b) => isChk(cat,a) - isChk(cat,b));
    const {total,done} = catTotals(cat);
    const isCollapsed  = !!collapsed[cat];
    const maxH = (items.length*50+4)+'px';
    const sec = document.createElement('div');
    sec.className = 'section'+(isCollapsed?' collapsed':'');
    sec.dataset.cat = cat;
    sec.innerHTML = `
      <div class="shdr">
        <div class="shdr-icon" style="background:${meta.bg}">${meta.icon}</div>
        <span class="shdr-title">${esc(cat)}</span>
        ${done===total && total>0
          ? `<span class="shdr-done">✓ All done</span>`
          : `<span class="shdr-count">${done}/${total}</span>`}
        <button class="shdr-restore${(hidden[cat]||[]).length>0?' visible':''}" data-restore="${esc(cat)}" title="Restore deleted items">↩</button>
        <button class="shdr-add" data-add="${esc(cat)}">+</button>
        <span class="shdr-chev">▼</span>
      </div>
      <div class="sitems" style="max-height:${isCollapsed?'0':maxH}">
        ${items.map(i=>itemHTML(cat,i)).join('')}
      </div>`;
    content.appendChild(sec);
  }
  updateHeader();
  setHdrH();
}

// ── Event delegation ──────────────────────────────────────────
document.getElementById('content').addEventListener('click', e => {
  // Delete item (custom = remove; default = hide)
  const del = e.target.closest('.item-del');
  if (del) {
    const c=del.dataset.dc, i=del.dataset.di;
    if (isCust(c,i)) {
      custom[c]=(custom[c]||[]).filter(x=>x!==i);
      save(K.custom,custom);
    } else {
      if (!hidden[c]) hidden[c]=[];
      if (!hidden[c].includes(i)) hidden[c].push(i);
      save(K.hidden,hidden);
    }
    delete state[sk(c,i)];
    save(K.state,state);
    refreshSectionItems(c); refreshSectionBadge(c); updateHeader();
    return;
  }
  // Restore hidden defaults for a section
  const restoreBtn = e.target.closest('.shdr-restore');
  if (restoreBtn) {
    const c=restoreBtn.dataset.restore;
    hidden[c]=[]; save(K.hidden,hidden);
    refreshSectionItems(c); refreshSectionBadge(c); updateHeader();
    return;
  }
  // Add button
  const addBtn = e.target.closest('.shdr-add');
  if (addBtn) {
    addTarget = addBtn.dataset.add;
    document.getElementById('addCatLbl').textContent = 'Adding to: '+addTarget;
    document.getElementById('newItem').value = '';
    openOv('addOverlay');
    setTimeout(()=>document.getElementById('newItem').focus(), 350);
    return;
  }
  // Collapse header
  const hdr = e.target.closest('.shdr');
  if (hdr && !e.target.closest('.shdr-add') && !e.target.closest('.shdr-restore')) {
    const sec = hdr.closest('.section');
    const cat = sec.dataset.cat;
    collapsed[cat] = !collapsed[cat];
    save(K.collapsed,collapsed);
    sec.classList.toggle('collapsed',!!collapsed[cat]);
    if (!collapsed[cat]) {
      sec.querySelector('.sitems').style.maxHeight = (allItems(cat).length*50+4)+'px';
    }
    return;
  }
  // Toggle item
  const item = e.target.closest('.item');
  if (item && !e.target.closest('.item-del')) {
    const c=item.dataset.cat, i=item.dataset.item;
    const meta = CATS[c]||{color:'#888'};
    state[sk(c,i)] = !state[sk(c,i)];
    save(K.state,state);
    const chk = state[sk(c,i)];
    item.classList.toggle('checked',chk);
    const cb = item.querySelector('.item-cb');
    cb.style.background  = chk ? meta.color : '';
    cb.style.borderColor = chk ? meta.color : '';
    item.querySelector('.item-stripe').style.opacity = chk ? '1' : '0';
    refreshSectionBadge(c);
    updateHeader();
  }
});

// ── Add item ──────────────────────────────────────────────────
document.getElementById('confirmAdd').addEventListener('click', () => {
  const val = document.getElementById('newItem').value.trim();
  if (!val || !addTarget) return;
  if (!custom[addTarget]) custom[addTarget]=[];
  if (!custom[addTarget].includes(val)) {
    custom[addTarget].push(val);
    save(K.custom,custom);
    refreshSectionItems(addTarget);
    refreshSectionBadge(addTarget);
    updateHeader();
  }
  closeOv('addOverlay');
});
document.getElementById('newItem').addEventListener('keydown', e => {
  if (e.key==='Enter') document.getElementById('confirmAdd').click();
});

// ── Reset ─────────────────────────────────────────────────────
document.getElementById('resetTrigger').addEventListener('click', ()=>openOv('resetOverlay'));
document.getElementById('confirmReset').addEventListener('click', ()=>{
  state={}; save(K.state,state); closeOv('resetOverlay'); render();
});

// ── Overlays ──────────────────────────────────────────────────
function openOv(id)  { document.getElementById(id).classList.remove('hidden'); }
function closeOv(id) { document.getElementById(id).classList.add('hidden'); }
document.querySelectorAll('.overlay').forEach(el=>{
  el.addEventListener('click',e=>{ if(e.target===el) closeOv(el.id); });
});
document.querySelectorAll('[data-close]').forEach(btn=>{
  btn.addEventListener('click',()=>closeOv(btn.dataset.close));
});

// ── Header height CSS var ─────────────────────────────────────
function setHdrH() {
  document.documentElement.style.setProperty('--hdr-h', document.getElementById('mhdr').offsetHeight+'px');
}
window.addEventListener('resize', setHdrH);

// ── Confetti ──────────────────────────────────────────────────
function launchConfetti() {
  const wrap=document.getElementById('confetti');
  wrap.classList.remove('hidden'); wrap.innerHTML='';
  const cols=["#E8563A","#3D6FD4","#2DB868","#C43DAA","#D4873D","#FFD700","#FF6B6B"];
  for(let i=0;i<80;i++){
    const d=document.createElement('div'); d.className='dot';
    d.style.cssText=`left:${Math.random()*100}%;background:${cols[i%cols.length]};width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.8}s`;
    wrap.appendChild(d);
  }
  setTimeout(()=>wrap.classList.add('hidden'),4000);
}

render();
</script>
</body>
</html>
